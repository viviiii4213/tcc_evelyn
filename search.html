<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Food Journey — Buscar receitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>Pesquisar receitas</h1>
      <p>Encontre receitas a partir dos ingredientes que você tem em casa.</p>
    </header>

    <form id="search-form" action="#" onsubmit="return false;">
      <div>
        <label for="q">O que você quer cozinhar?</label>
        <input id="q" name="q" type="text" placeholder="Ex: macarrão, frango, vegetariano">
      </div>

      <div style="margin-top:1rem;">
        <button type="button" onclick="alert('Busca simulada — implementar integração')">Pesquisar</button>
      </div>
    </form>

    <p style="margin-top:1rem;color:var(--muted)">Bem-vindo! Esta tela é um ponto inicial. Implemente a integração com sua API de receitas para resultados reais.</p>

  </main>
</body>
</html>
